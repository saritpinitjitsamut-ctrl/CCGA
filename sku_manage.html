<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการ SKU | Stock Record</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="sku_manage.css">
    <script src="theme.js" defer></script>
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div class="header-top">
                <a href="index.html" class="back-link">← กลับหน้าหลัก</a>
                <button class="theme-toggle-button" id="themeToggleBtn" type="button">🌙 โหมดมืด</button>
            </div>
            <div class="header-content">
                <div class="logo-badge">📦</div>
                <div>
                    <h1>จัดการ SKU</h1>
                    <p>ค้นหา แก้ไข และเพิ่มข้อมูล SKU ได้จากหน้าเดียว</p>
                </div>
            </div>
        </header>

        <main class="card">
            <div class="toolbar">
                <input id="skuSearch" class="search-input" type="text" placeholder="ค้นหา SKU / ชื่อสินค้า / ขนาด">
                <button id="newSkuBtn" class="btn btn-primary" type="button">＋ SKU ใหม่</button>
            </div>

            <div id="formStatus" class="status-message" role="status" aria-live="polite"></div>

            <div class="layout-grid">
                <section class="panel list-panel">
                    <div class="panel-header">
                        <div>
                            <h2>รายการ SKU</h2>
                            <p>คลิกที่แถวเพื่อแก้ไข</p>
                        </div>
                        <span id="skuCount" class="count-badge">0 รายการ</span>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>SKU</th>
                                    <th>ชื่อสินค้า</th>
                                    <th>ขนาด</th>
                                    <th>ราคา</th>
                                </tr>
                            </thead>
                            <tbody id="skuTableBody">
                                <tr>
                                    <td colspan="4" class="empty-state">กำลังโหลดข้อมูล...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="panel form-panel">
                    <div class="panel-header">
                        <div>
                            <h2>รายละเอียด SKU</h2>
                            <p>บันทึกข้อมูลและอัปเดตข้อมูล SKU</p>
                        </div>
                    </div>

                    <form id="skuForm" class="sku-form">
                        <div class="input-group full-width">
                            <label for="productCode">SKU / Product Code</label>
                            <input id="productCode" name="productCode" type="text" required placeholder="เช่น SLD2P1520BBNL5">
                        </div>
                        <div class="input-group full-width">
                            <label for="name">ชื่อสินค้า</label>
                            <input id="name" name="name" type="text" required placeholder="เช่น ประตูบานคู่...">
                        </div>
                        <div class="input-group">
                            <label for="productPrefix">ประเภทสินค้า</label>
                            <select id="productPrefix" name="productPrefix">
                                <option value="">-- ไม่ระบุ --</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="size">ขนาด</label>
                            <input id="size" name="size" type="text" required placeholder="เช่น 1500x2000">
                        </div>
                        <div class="input-group">
                            <label for="slots">จำนวนช่อง</label>
                            <input id="slots" name="slots" type="number" min="1" value="1">
                        </div>
                        <div class="input-group">
                            <label for="price">ราคากลาง</label>
                            <input id="price" name="price" type="number" min="0" step="0.01" value="0">
                        </div>
                        <div class="input-group">
                            <label for="patternCode">รหัสลาย</label>
                            <input id="patternCode" name="patternCode" type="text" placeholder="เช่น L!, L2, L3">
                        </div>
                        <div class="input-group">
                            <label for="pattern">ชื่อลาย</label>
                            <input id="pattern" name="pattern" type="text" placeholder="เช่น ลายธรรมดา">
                        </div>
                        <div class="input-group">
                            <label for="frameColor">สีกรอบ</label>
                            <select id="frameColor" name="frameColor">
                                <option value="">-- ไม่ระบุ --</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="glassColor">สีกระจก</label>
                            <select id="glassColor" name="glassColor">
                                <option value="">-- ไม่ระบุ --</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="netId">สถานะมุ้ง</label>
                            <select id="netId" name="netId">
                                <option value="">-- ไม่ระบุ --</option>
                            </select>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submitBtn">💾 บันทึก SKU</button>
                            <button type="button" class="btn btn-outline" id="deleteBtn">🗑️ ลบ</button>
                            <button type="reset" class="btn btn-secondary" id="resetBtn">ล้างฟอร์ม</button>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script src="sku_manage.js"></script>
</body>
</html>
